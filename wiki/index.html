<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>wiki</title>
  <script src="https://cdn.jsdelivr.net/npm/marked@4/marked.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;1,400&family=JetBrains+Mono:wght@400;500&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f0f0d;
      --surface: #181815;
      --border: #2a2a26;
      --border-hover: #3d3d38;
      --text: #e8e6df;
      --text-muted: #7a7870;
      --text-dim: #4a4844;
      --accent: #c8b87a;
      --accent-dim: #8a7d52;
      --link: #7ab8c8;
      --code-bg: #1c1c19;
      --sidebar-w: 240px;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      line-height: 1.6;
    }

    .layout {
      display: flex;
      min-height: 100vh;
    }

    /* ── Sidebar ── */
    #sidebar {
      width: var(--sidebar-w);
      flex-shrink: 0;
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      position: sticky;
      top: 0;
      height: 100vh;
      overflow-y: auto;
    }

    .sidebar-header {
      padding: 28px 20px 20px;
      border-bottom: 1px solid var(--border);
    }

    .sidebar-title {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--accent);
    }

    .sidebar-subtitle {
      font-size: 12px;
      color: var(--text-muted);
      margin-top: 4px;
    }

    nav {
      padding: 16px 12px;
      flex: 1;
    }

    nav a {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 12px;
      border-radius: 6px;
      color: var(--text-muted);
      text-decoration: none;
      font-size: 13.5px;
      transition: color 0.15s, background 0.15s;
      position: relative;
    }

    nav a::before {
      content: '';
      width: 4px;
      height: 4px;
      border-radius: 50%;
      background: var(--text-dim);
      flex-shrink: 0;
      transition: background 0.15s;
    }

    nav a:hover {
      color: var(--text);
      background: rgba(255,255,255,0.04);
    }

    nav a:hover::before {
      background: var(--accent-dim);
    }

    nav a.active {
      color: var(--text);
      background: rgba(200, 184, 122, 0.08);
    }

    nav a.active::before {
      background: var(--accent);
    }

    /* ── Content ── */
    #content-wrap {
      flex: 1;
      min-width: 0;
      display: flex;
      flex-direction: column;
    }

    .topbar {
      border-bottom: 1px solid var(--border);
      padding: 14px 48px;
      display: flex;
      align-items: center;
      gap: 8px;
      min-height: 52px;
    }

    .breadcrumb {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      color: var(--text-muted);
      letter-spacing: 0.04em;
    }

    .breadcrumb span {
      color: var(--text-dim);
      margin: 0 6px;
    }

    #content {
      max-width: 720px;
      width: 100%;
      margin: 0 auto;
      padding: 48px 48px 96px;
    }

    /* ── Markdown styles ── */
    #content h1, #content h2, #content h3,
    #content h4, #content h5, #content h6 {
      font-family: 'Lora', serif;
      font-weight: 600;
      color: var(--text);
      line-height: 1.3;
    }

    #content h1 { font-size: 2rem; margin-bottom: 1rem; margin-top: 0; }
    #content h2 { font-size: 1.4rem; margin-top: 2.5rem; margin-bottom: 0.75rem; padding-bottom: 0.5rem; border-bottom: 1px solid var(--border); }
    #content h3 { font-size: 1.1rem; margin-top: 2rem; margin-bottom: 0.5rem; }

    #content p { margin-bottom: 1.1rem; color: var(--text); }

    #content a {
      color: var(--link);
      text-decoration: underline;
      text-decoration-color: rgba(122, 184, 200, 0.35);
      text-underline-offset: 2px;
      transition: text-decoration-color 0.15s;
    }
    #content a:hover { text-decoration-color: var(--link); }

    #content ul, #content ol {
      padding-left: 1.5rem;
      margin-bottom: 1.1rem;
    }
    #content li { margin-bottom: 0.3rem; }

    #content code {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.82em;
      background: var(--code-bg);
      border: 1px solid var(--border);
      padding: 1px 6px;
      border-radius: 4px;
      color: var(--accent);
    }

    #content pre {
      background: var(--code-bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 20px 24px;
      overflow-x: auto;
      margin-bottom: 1.5rem;
    }
    #content pre code {
      background: none;
      border: none;
      padding: 0;
      font-size: 0.85em;
      color: var(--text);
    }

    #content blockquote {
      border-left: 3px solid var(--accent-dim);
      padding: 4px 0 4px 20px;
      margin: 1.5rem 0;
      color: var(--text-muted);
      font-style: italic;
      font-family: 'Lora', serif;
    }

    #content hr {
      border: none;
      border-top: 1px solid var(--border);
      margin: 2.5rem 0;
    }

    #content table {
      width: 100%;
      border-collapse: collapse;
      margin-bottom: 1.5rem;
      font-size: 14px;
    }
    #content th {
      background: var(--surface);
      border: 1px solid var(--border);
      padding: 8px 14px;
      text-align: left;
      font-weight: 500;
      font-size: 12px;
      letter-spacing: 0.04em;
      color: var(--text-muted);
    }
    #content td {
      border: 1px solid var(--border);
      padding: 8px 14px;
    }

    #content img {
      max-width: 100%;
      border-radius: 6px;
      border: 1px solid var(--border);
    }

    /* ── State messages ── */
    .state-msg {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 40vh;
      flex-direction: column;
      gap: 12px;
      color: var(--text-muted);
    }

    .state-msg .code {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      color: var(--text-dim);
    }

    .spinner {
      width: 20px;
      height: 20px;
      border: 2px solid var(--border);
      border-top-color: var(--accent-dim);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    @keyframes fadein {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .fade-in { animation: fadein 0.25s ease forwards; }

    /* ── Responsive ── */
    @media (max-width: 680px) {
      #sidebar { position: fixed; left: -100%; transition: left 0.2s; z-index: 100; }
      #sidebar.open { left: 0; }
      #content { padding: 32px 24px 64px; }
      .topbar { padding: 14px 24px; }
    }
  </style>
</head>
<body>
<div class="layout">
  <aside id="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-title">wiki</div>
      <div class="sidebar-subtitle">knowledge base</div>
    </div>
    <nav id="nav">
      <a href="#index.md" data-file="index.md">home</a>
      <a href="#about.md" data-file="about.md">about</a>
      <a href="#selfhost.md" data-file="selfhost.md">self-host</a>
    </nav>
  </aside>

  <div id="content-wrap">
    <div class="topbar">
      <div class="breadcrumb" id="breadcrumb">
        wiki <span>/</span> <span id="page-name">—</span>
      </div>
    </div>
    <div id="content">
      <div class="state-msg">
        <div class="spinner"></div>
        <div class="code">loading…</div>
      </div>
    </div>
  </div>
</div>

<script>
  marked.setOptions({ breaks: true, gfm: true });

  const content = document.getElementById('content');
  const pageName = document.getElementById('page-name');
  const navLinks = document.querySelectorAll('nav a');

  function getFile() {
    const hash = location.hash.slice(1);
    if (!hash || !hash.endsWith('.md')) return 'index.md';
    return hash;
  }

  function setActive(file) {
    navLinks.forEach(a => {
      a.classList.toggle('active', a.dataset.file === file);
    });
    const base = file.replace(/\.md$/, '');
    pageName.textContent = base;
    document.title = `${base} — wiki`;
  }

  async function loadPage() {
    const file = getFile();
    setActive(file);

    content.innerHTML = `<div class="state-msg"><div class="spinner"></div><div class="code">loading…</div></div>`;

    try {
      const res = await fetch(`./${file}`);
      if (!res.ok) throw new Error(res.status);
      const text = await res.text();
      const html = await Promise.resolve(marked.parse(text));
      content.innerHTML = `<div class="fade-in">${html}</div>`;
    } catch (e) {
      content.innerHTML = `
        <div class="state-msg">
          <div style="font-size:1.5rem;opacity:0.3">∅</div>
          <div>page not found</div>
          <div class="code">${file}</div>
        </div>`;
    }

    window.scrollTo(0, 0);
  }

  window.addEventListener('hashchange', loadPage);
  loadPage();
</script>
</body>
</html>
