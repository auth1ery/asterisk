<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>asterisk admin</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:       #0e0e10;
  --surface:  #16161a;
  --surface2: #1e1e24;
  --border:   rgba(255,255,255,0.08);
  --border2:  rgba(255,255,255,0.14);
  --text:     #e8e8ef;
  --muted:    #6b6b7a;
  --accent:   #8b7ef5;
  --danger:   #f55b5b;
  --success:  #4dffa0;
  --warning:  #f5a742;
  --radius:   6px;
}

body {
  font-family: 'JetBrains Mono', monospace;
  background: var(--bg);
  color: var(--text);
  font-size: 12px;
  min-height: 100vh;
}

/* ── Header ── */
#header {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 14px 24px;
  border-bottom: 1px solid var(--border);
  background: var(--surface);
}
.logo { display: flex; align-items: center; gap: 6px; }
.star { font-size: 20px; color: var(--accent); font-weight: 700; }
.wordmark { font-size: 14px; font-weight: 500; letter-spacing: 0.5px; }
.badge {
  font-size: 9px;
  background: rgba(139,126,245,0.18);
  color: var(--accent);
  border: 1px solid rgba(139,126,245,0.3);
  border-radius: 3px;
  padding: 2px 6px;
  letter-spacing: 1px;
  text-transform: uppercase;
}
.header-spacer { flex: 1; }
#conn-badge {
  font-size: 10px;
  color: var(--muted);
  display: flex;
  align-items: center;
  gap: 5px;
}
.dot {
  width: 7px; height: 7px;
  border-radius: 50%;
  background: var(--muted);
  display: inline-block;
}
.dot.ok { background: var(--success); }
.dot.err { background: var(--danger); }

/* ── Config bar ── */
#config-bar {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 10px 24px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
}
#config-bar input {
  background: var(--bg);
  border: 1px solid var(--border2);
  color: var(--text);
  font-family: inherit;
  font-size: 11px;
  border-radius: var(--radius);
  padding: 5px 10px;
  outline: none;
}
#config-bar input:focus { border-color: var(--accent); }
#url-input  { width: 240px; }
#key-input  { width: 180px; }
#connect-btn {
  background: rgba(139,126,245,0.15);
  border: 1px solid rgba(139,126,245,0.35);
  color: var(--accent);
  font-family: inherit;
  font-size: 11px;
  border-radius: var(--radius);
  padding: 5px 14px;
  cursor: pointer;
  transition: background 0.15s;
}
#connect-btn:hover { background: rgba(139,126,245,0.25); }
.cfg-label { color: var(--muted); font-size: 10px; letter-spacing: 0.5px; }

/* ── Stats strip ── */
#stats-strip {
  display: flex;
  gap: 1px;
  background: var(--border);
  border-bottom: 1px solid var(--border);
}
.stat-card {
  flex: 1;
  background: var(--surface);
  padding: 14px 20px;
  display: flex;
  flex-direction: column;
  gap: 4px;
}
.stat-label { font-size: 9px; color: var(--muted); letter-spacing: 1px; text-transform: uppercase; }
.stat-value { font-size: 22px; font-weight: 700; color: var(--text); }
.stat-value.accent { color: var(--accent); }
.stat-value.danger { color: var(--danger); }

/* ── Main grid ── */
#main {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 1px;
  background: var(--border);
  min-height: calc(100vh - 130px);
}
.panel {
  background: var(--surface);
  display: flex;
  flex-direction: column;
}
.panel-head {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 12px 18px;
  border-bottom: 1px solid var(--border);
  font-size: 10px;
  letter-spacing: 1px;
  color: var(--muted);
  text-transform: uppercase;
}
.panel-head .count {
  margin-left: auto;
  background: var(--surface2);
  border: 1px solid var(--border2);
  border-radius: 3px;
  padding: 2px 7px;
  color: var(--text);
  font-size: 10px;
}
.panel-head button {
  margin-left: 4px;
  background: transparent;
  border: 1px solid var(--border2);
  color: var(--muted);
  font-family: inherit;
  font-size: 10px;
  border-radius: var(--radius);
  padding: 2px 8px;
  cursor: pointer;
  transition: color 0.15s, border-color 0.15s;
}
.panel-head button:hover { color: var(--text); border-color: var(--accent); }

.panel-body {
  flex: 1;
  overflow-y: auto;
}
.panel-body::-webkit-scrollbar { width: 4px; }
.panel-body::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

/* ── User rows ── */
.user-row {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 9px 18px;
  border-bottom: 1px solid var(--border);
  transition: background 0.1s;
}
.user-row:hover { background: var(--surface2); }
.user-row:last-child { border-bottom: none; }

.user-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  flex-shrink: 0;
}
.username {
  flex: 1;
  font-size: 12px;
  color: var(--text);
  font-weight: 500;
}
.online-tag {
  font-size: 9px;
  color: var(--success);
  border: 1px solid rgba(77,255,160,0.25);
  background: rgba(77,255,160,0.07);
  border-radius: 3px;
  padding: 2px 5px;
}
.offline-tag {
  font-size: 9px;
  color: var(--muted);
  border: 1px solid var(--border2);
  background: var(--surface2);
  border-radius: 3px;
  padding: 2px 5px;
}

.row-actions { display: flex; gap: 5px; }
.btn-kick, .btn-ban, .btn-del {
  font-family: inherit;
  font-size: 10px;
  border-radius: var(--radius);
  padding: 3px 9px;
  cursor: pointer;
  transition: background 0.15s, color 0.15s;
  border: 1px solid;
}
.btn-kick {
  background: rgba(245,167,66,0.1);
  border-color: rgba(245,167,66,0.3);
  color: var(--warning);
}
.btn-kick:hover { background: rgba(245,167,66,0.22); }
.btn-del {
  background: rgba(245,91,91,0.1);
  border-color: rgba(245,91,91,0.3);
  color: var(--danger);
}
.btn-del:hover { background: rgba(245,91,91,0.22); }
.btn-kick:disabled, .btn-del:disabled {
  opacity: 0.35;
  cursor: not-allowed;
}

/* ── Log panel ── */
#log-panel {
  grid-column: 1 / -1;
  background: var(--surface);
  border-top: 1px solid var(--border);
  max-height: 200px;
  display: flex;
  flex-direction: column;
}
#log-panel .panel-head { flex-shrink: 0; }
#log-body {
  flex: 1;
  overflow-y: auto;
  padding: 8px 18px;
  font-size: 11px;
  line-height: 1.7;
}
#log-body::-webkit-scrollbar { width: 4px; }
#log-body::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }
.log-line { color: var(--muted); }
.log-line .log-time { color: rgba(107,107,122,0.6); margin-right: 8px; }
.log-line.ok .log-msg   { color: var(--success); }
.log-line.err .log-msg  { color: var(--danger); }
.log-line.warn .log-msg { color: var(--warning); }
.log-line.info .log-msg { color: var(--accent); }

/* ── Empty state ── */
.empty {
  padding: 32px 18px;
  color: var(--muted);
  font-size: 11px;
  text-align: center;
}

/* ── Search ── */
.panel-search {
  padding: 8px 18px;
  border-bottom: 1px solid var(--border);
}
.panel-search input {
  width: 100%;
  background: var(--bg);
  border: 1px solid var(--border2);
  color: var(--text);
  font-family: inherit;
  font-size: 11px;
  border-radius: var(--radius);
  padding: 5px 10px;
  outline: none;
}
.panel-search input:focus { border-color: var(--accent); }

/* ── Confirm overlay ── */
#confirm-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.6);
  z-index: 100;
  align-items: center;
  justify-content: center;
}
#confirm-overlay.visible { display: flex; }
#confirm-box {
  background: var(--surface);
  border: 1px solid var(--border2);
  border-radius: var(--radius);
  padding: 24px;
  width: 320px;
  display: flex;
  flex-direction: column;
  gap: 16px;
}
#confirm-title { font-size: 13px; font-weight: 500; }
#confirm-msg   { font-size: 11px; color: var(--muted); line-height: 1.6; }
#confirm-actions { display: flex; gap: 8px; justify-content: flex-end; }
.btn-cancel {
  background: var(--surface2);
  border: 1px solid var(--border2);
  color: var(--muted);
  font-family: inherit;
  font-size: 11px;
  border-radius: var(--radius);
  padding: 6px 14px;
  cursor: pointer;
}
.btn-cancel:hover { color: var(--text); }
.btn-confirm-danger {
  background: rgba(245,91,91,0.15);
  border: 1px solid rgba(245,91,91,0.35);
  color: var(--danger);
  font-family: inherit;
  font-size: 11px;
  border-radius: var(--radius);
  padding: 6px 14px;
  cursor: pointer;
}
.btn-confirm-danger:hover { background: rgba(245,91,91,0.25); }

/* ── Toast ── */
#toast-wrap {
  position: fixed;
  bottom: 16px; right: 16px;
  display: flex;
  flex-direction: column;
  gap: 6px;
  z-index: 200;
}
.toast {
  background: var(--surface);
  border: 1px solid var(--border2);
  border-radius: var(--radius);
  padding: 8px 14px;
  font-size: 11px;
  color: var(--text);
  animation: fadeUp 0.15s ease;
}
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(6px); }
  to   { opacity: 1; transform: translateY(0); }
}
</style>
</head>
<body>
<!-- ── Dashboard key gate ── -->
<div id="gate" style="
  position:fixed;inset:0;background:#000;z-index:9999;
  display:flex;align-items:center;justify-content:center;
">
  <input id="gate-input" type="password" autocomplete="off" spellcheck="false"
    placeholder="—" autofocus
    style="
      background:transparent;border:none;border-bottom:1px solid #333;
      color:#fff;font-family:'JetBrains Mono',monospace;font-size:18px;
      outline:none;text-align:center;width:260px;padding:8px 0;
      letter-spacing:4px;caret-color:#8b7ef5;
    "
    onkeydown="if(event.key==='Enter') verifyGate()"
  >
  <div id="gate-err" style="
    position:absolute;bottom:40%;font-family:'JetBrains Mono',monospace;
    font-size:11px;color:#f55b5b;letter-spacing:1px;opacity:0;
    transition:opacity 0.2s;
  ">wrong key</div>
</div>

<!-- Header -->
<div id="header">
  <div class="logo">
    <span class="star">*</span>
    <span class="wordmark">asterisk</span>
    <span class="badge">admin</span>
  </div>
  <div class="header-spacer"></div>
  <div id="conn-badge">
    <span class="dot" id="conn-dot"></span>
    <span id="conn-text">not connected</span>
  </div>
</div>

<!-- Config bar -->
<div id="config-bar">
  <span class="cfg-label">url</span>
  <input id="url-input" type="text" placeholder="http://localhost:3001" spellcheck="false">
  <span class="cfg-label">secret</span>
  <input id="key-input" type="password" placeholder="admin secret">
  <button id="connect-btn" onclick="connect()">connect →</button>
  <span id="cfg-msg" style="font-size:10px;color:var(--muted);margin-left:6px;"></span>
</div>

<!-- Stats -->
<div id="stats-strip">
  <div class="stat-card">
    <div class="stat-label">online now</div>
    <div class="stat-value accent" id="stat-online">—</div>
  </div>
  <div class="stat-card">
    <div class="stat-label">total accounts</div>
    <div class="stat-value" id="stat-accounts">—</div>
  </div>
  <div class="stat-card">
    <div class="stat-label">last refreshed</div>
    <div class="stat-value" id="stat-refresh" style="font-size:14px;padding-top:4px;">—</div>
  </div>
  <div class="stat-card">
    <div class="stat-label">auto-refresh</div>
    <div class="stat-value" id="stat-auto" style="font-size:14px;padding-top:4px;cursor:pointer;" onclick="toggleAutoRefresh()">off</div>
  </div>
</div>

<!-- Main panels -->
<div id="main">

  <!-- Online users -->
  <div class="panel">
    <div class="panel-head">
      ● online sessions
      <button onclick="fetchOnline()">↻ refresh</button>
      <span class="count" id="online-count">0</span>
    </div>
    <div class="panel-body" id="online-list">
      <div class="empty">connect to load sessions</div>
    </div>
  </div>

  <!-- All accounts -->
  <div class="panel">
    <div class="panel-head">
      ◎ all accounts
      <button onclick="fetchAccounts()">↻ refresh</button>
      <span class="count" id="accounts-count">0</span>
    </div>
    <div class="panel-search">
      <input id="account-search" type="text" placeholder="filter accounts..." spellcheck="false" oninput="filterAccounts()">
    </div>
    <div class="panel-body" id="accounts-list">
      <div class="empty">connect to load accounts</div>
    </div>
  </div>

  <!-- Log -->
  <div id="log-panel">
    <div class="panel-head">
      ◈ action log
      <button onclick="clearLog()">clear</button>
    </div>
    <div id="log-body">
      <div class="log-line info"><span class="log-time">--:--:--</span><span class="log-msg">admin panel ready. enter your backend url and secret above.</span></div>
    </div>
  </div>
</div>

<!-- Confirm dialog -->
<div id="confirm-overlay" onclick="closeConfirm(event)">
  <div id="confirm-box">
    <div id="confirm-title"></div>
    <div id="confirm-msg"></div>
    <div id="confirm-actions">
      <button class="btn-cancel" onclick="closeConfirm()">cancel</button>
      <button class="btn-confirm-danger" id="confirm-ok">confirm</button>
    </div>
  </div>
</div>

<!-- Toast container -->
<div id="toast-wrap"></div>
<script>
let BASE_URL      = '';
let ADMIN_SECRET  = '';
let online        = [];
let allAccounts   = [];
let onlineSet     = new Set();
let autoRefresh   = false;
let autoTimer     = null;
let connected     = false;

// ── Config ────────────────────────────────────────────────────────────────────
function loadConfig() {
  const u = localStorage.getItem('asterisk_admin_url');
  const k = localStorage.getItem('asterisk_admin_key');
  if (u) document.getElementById('url-input').value = u;
  if (k) document.getElementById('key-input').value = k;
}

function saveConfig() {
  localStorage.setItem('asterisk_admin_url', BASE_URL);
  localStorage.setItem('asterisk_admin_key', ADMIN_SECRET);
}

async function connect() {
  BASE_URL     = document.getElementById('url-input').value.trim().replace(/\/$/, '');
  ADMIN_SECRET = document.getElementById('key-input').value.trim();
  const msg    = document.getElementById('cfg-msg');

  if (!BASE_URL) { msg.textContent = 'enter a url'; return; }
  msg.textContent = 'connecting…';

  try {
    const res = await adminFetch('GET', '/api/health');
    if (res.ok) {
      connected = true;
      setConnStatus(true);
      msg.textContent = '';
      saveConfig();
      log('info', `connected to ${BASE_URL}`);
      await fetchAll();
    } else {
      setConnStatus(false);
      msg.textContent = 'unreachable';
    }
  } catch {
    setConnStatus(false);
    msg.textContent = 'connection failed';
    log('err', 'could not reach backend');
  }
}

function setConnStatus(ok) {
  document.getElementById('conn-dot').className  = 'dot ' + (ok ? 'ok' : 'err');
  document.getElementById('conn-text').textContent = ok ? 'connected' : 'disconnected';
}

// ── API helpers ───────────────────────────────────────────────────────────────
function adminFetch(method, path, body) {
  const opts = {
    method,
    headers: { 'x-admin-secret': ADMIN_SECRET }
  };
  if (body) { opts.headers['Content-Type'] = 'application/json'; opts.body = JSON.stringify(body); }
  return fetch(BASE_URL + path, opts);
}

// ── Fetch data ────────────────────────────────────────────────────────────────
async function fetchAll() {
  await Promise.all([fetchOnline(), fetchAccounts()]);
  document.getElementById('stat-refresh').textContent = new Date().toLocaleTimeString();
}

async function fetchOnline() {
  if (!connected) return;
  try {
    const res  = await adminFetch('GET', '/api/admin/online');
    if (!res.ok) { log('err', `online fetch failed: ${res.status}`); return; }
    online    = await res.json();
    onlineSet = new Set(online.map(u => u.username));
    renderOnline();
    renderAccounts(); // refresh online status in accounts list
    document.getElementById('stat-online').textContent   = online.length;
    document.getElementById('online-count').textContent  = online.length;
  } catch(e) { log('err', 'fetch online error: ' + e.message); }
}

async function fetchAccounts() {
  if (!connected) return;
  try {
    const res  = await adminFetch('GET', '/api/admin/accounts');
    if (!res.ok) { log('err', `accounts fetch failed: ${res.status}`); return; }
    allAccounts = await res.json();
    renderAccounts();
    document.getElementById('stat-accounts').textContent  = allAccounts.length;
    document.getElementById('accounts-count').textContent = allAccounts.length;
  } catch(e) { log('err', 'fetch accounts error: ' + e.message); }
}

// ── Render ────────────────────────────────────────────────────────────────────
function renderOnline() {
  const list = document.getElementById('online-list');
  list.innerHTML = '';
  if (!online.length) {
    list.innerHTML = '<div class="empty">no active sessions</div>';
    return;
  }
  online.forEach(u => {
    const row = document.createElement('div');
    row.className = 'user-row';
    row.innerHTML = `
      <span class="user-dot" style="background:${u.color || '#888'}"></span>
      <span class="username">${esc(u.username)}</span>
      <span class="online-tag">online</span>
      <div class="row-actions">
        <button class="btn-kick" onclick="confirmKick('${esc(u.username)}')">kick</button>
      </div>
    `;
    list.appendChild(row);
  });
}

function renderAccounts(filter) {
  const q    = filter ?? document.getElementById('account-search').value.toLowerCase();
  const list = document.getElementById('accounts-list');
  list.innerHTML = '';
  const filtered = q ? allAccounts.filter(a => a.username.toLowerCase().includes(q)) : allAccounts;
  if (!filtered.length) { list.innerHTML = '<div class="empty">no accounts found</div>'; return; }
  filtered.forEach(a => {
    const isOnline = onlineSet.has(a.username);
    const row = document.createElement('div');
    row.className = 'user-row';
    row.innerHTML = `
      <span class="user-dot" style="background:${a.color || '#888'}"></span>
      <span class="username">${esc(a.username)}</span>
      ${isOnline ? '<span class="online-tag">online</span>' : '<span class="offline-tag">offline</span>'}
      <div class="row-actions">
        ${isOnline ? `<button class="btn-kick" onclick="confirmKick('${esc(a.username)}')">kick</button>` : '<button class="btn-kick" disabled>kick</button>'}
        <button class="btn-del" onclick="confirmDelete('${esc(a.username)}')">delete</button>
      </div>
    `;
    list.appendChild(row);
  });
}

function filterAccounts() {
  renderAccounts(document.getElementById('account-search').value.toLowerCase());
}

// ── Actions ───────────────────────────────────────────────────────────────────
async function kickUser(username) {
  try {
    const res  = await adminFetch('POST', `/api/admin/kick/${encodeURIComponent(username)}`);
    const data = await res.json();
    if (data.kicked) {
      log('warn', `kicked session: ${username}`);
      toast(`kicked ${username}`);
      await fetchOnline();
    } else {
      log('info', `${username} had no active session`);
      toast(`${username} wasn't online`);
    }
  } catch(e) { log('err', 'kick failed: ' + e.message); }
}

async function deleteAccount(username) {
  try {
    const res = await adminFetch('DELETE', `/api/admin/accounts/${encodeURIComponent(username)}`);
    if (res.ok) {
      log('err', `deleted account: ${username}`);
      toast(`account deleted: ${username}`);
      allAccounts = allAccounts.filter(a => a.username !== username);
      onlineSet.delete(username);
      online = online.filter(u => u.username !== username);
      renderAccounts();
      renderOnline();
      document.getElementById('stat-accounts').textContent  = allAccounts.length;
      document.getElementById('accounts-count').textContent = allAccounts.length;
      document.getElementById('stat-online').textContent    = online.length;
      document.getElementById('online-count').textContent   = online.length;
    } else {
      const data = await res.json();
      log('err', `delete failed: ${data.error}`);
    }
  } catch(e) { log('err', 'delete failed: ' + e.message); }
}

// ── Confirm dialog ────────────────────────────────────────────────────────────
let confirmCb = null;

function confirmKick(username) {
  showConfirm(
    `kick ${username}?`,
    `this will close their websocket session. they can reconnect immediately.`,
    () => kickUser(username)
  );
}

function confirmDelete(username) {
  showConfirm(
    `delete account "${username}"?`,
    `this permanently removes the account and all associated data. their session will also be terminated. this cannot be undone.`,
    () => deleteAccount(username)
  );
}

function showConfirm(title, msg, cb) {
  document.getElementById('confirm-title').textContent = title;
  document.getElementById('confirm-msg').textContent   = msg;
  confirmCb = cb;
  document.getElementById('confirm-overlay').classList.add('visible');
  document.getElementById('confirm-ok').onclick = () => { closeConfirm(); cb(); };
}

function closeConfirm(e) {
  if (e && e.target !== document.getElementById('confirm-overlay')) return;
  document.getElementById('confirm-overlay').classList.remove('visible');
}

// ── Auto-refresh ──────────────────────────────────────────────────────────────
function toggleAutoRefresh() {
  autoRefresh = !autoRefresh;
  const el = document.getElementById('stat-auto');
  el.textContent = autoRefresh ? '10s' : 'off';
  el.style.color = autoRefresh ? 'var(--success)' : 'var(--text)';
  if (autoRefresh) {
    autoTimer = setInterval(() => { if (connected) fetchAll(); }, 10000);
  } else {
    clearInterval(autoTimer);
  }
}

// ── Log ───────────────────────────────────────────────────────────────────────
function log(level, msg) {
  const body = document.getElementById('log-body');
  const now  = new Date().toLocaleTimeString();
  const line = document.createElement('div');
  line.className = 'log-line ' + level;
  line.innerHTML = `<span class="log-time">${now}</span><span class="log-msg">${esc(msg)}</span>`;
  body.appendChild(line);
  body.scrollTop = body.scrollHeight;
}

function clearLog() {
  document.getElementById('log-body').innerHTML = '';
}

// ── Toast ─────────────────────────────────────────────────────────────────────
function toast(msg) {
  const wrap = document.getElementById('toast-wrap');
  const el   = document.createElement('div');
  el.className   = 'toast';
  el.textContent = msg;
  wrap.appendChild(el);
  setTimeout(() => el.remove(), 3000);
}

// ── Util ──────────────────────────────────────────────────────────────────────
function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

// ── Keyboard shortcuts ────────────────────────────────────────────────────────
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeConfirm();
  if (e.key === 'Enter' && document.getElementById('confirm-overlay').classList.contains('visible')) {
    document.getElementById('confirm-ok').click();
  }
});

// ── Enter to connect ──────────────────────────────────────────────────────────
document.getElementById('key-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') connect();
});

// ── Init ──────────────────────────────────────────────────────────────────────
loadConfig();

// ── Gate logic ────────────────────────────────────────────────────────────────
async function verifyGate() {
  const key = document.getElementById('gate-input').value;
  const err = document.getElementById('gate-err');
  if (!key) return;

  // Use whatever BASE_URL is typed in the config bar, fallback to origin
  const base = document.getElementById('url-input').value.trim().replace(/\/$/,'')
               || window.location.origin;

  try {
    const res  = await fetch(base + '/api/admin/dashkey', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ key })
    });
    if (res.ok) {
      sessionStorage.setItem('asterisk_admin_unlocked', '1');
      document.getElementById('gate').style.opacity = '0';
      document.getElementById('gate').style.transition = 'opacity 0.3s';
      setTimeout(() => document.getElementById('gate').remove(), 300);
    } else {
      err.style.opacity = '1';
      document.getElementById('gate-input').value = '';
      setTimeout(() => { err.style.opacity = '0'; }, 2000);
    }
  } catch {
    err.textContent  = 'server unreachable';
    err.style.opacity = '1';
    setTimeout(() => { err.style.opacity = '0'; }, 2000);
  }
}

// Skip gate if already unlocked this session
if (sessionStorage.getItem('asterisk_admin_unlocked') === '1') {
  document.getElementById('gate')?.remove();
} else {
  // Prevent any interaction with content behind the gate
  document.getElementById('gate').addEventListener('click', () =>
    document.getElementById('gate-input').focus()
  );
}
</script>
</body>
