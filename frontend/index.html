<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>asterisk</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:ital,wght@0,300;0,400;0,500;0,700;1,300;1,400&display=swap" rel="stylesheet">
  <style>
    /* ── Reset & Base ──────────────────────────────────────────────────────── */
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg:          #09090d;
      --surface:     #0f0f14;
      --surface2:    #141419;
      --border:      #1c1c24;
      --border2:     #24242f;
      --text:        #c8c8d8;
      --muted:       #4a4a60;
      --muted2:      #2e2e3e;
      --accent:      #8b7ef5;
      --accent-glow: rgba(139,126,245,0.2);
      --danger:      #ff4d6a;
      --success:     #4dffa0;
      --system-fg:   #3a3a52;
      --radius:      6px;
      --font:        'JetBrains Mono', 'Courier New', monospace;
    }

    html, body { height: 100%; overflow: hidden; }

    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      font-size: 13px;
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Scrollbar ─────────────────────────────────────────────────────────── */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--muted); }

    /* ── Utilities ─────────────────────────────────────────────────────────── */
    .hidden { display: none !important; }

    /* ── Auth Screen ───────────────────────────────────────────────────────── */
    #auth-screen {
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      background:
        radial-gradient(ellipse 60% 40% at 50% 0%, rgba(139,126,245,0.06) 0%, transparent 70%),
        var(--bg);
    }

    .auth-card {
      width: 360px;
      padding: 40px 36px 36px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
    }

    .auth-logo {
      text-align: center;
      margin-bottom: 28px;
    }

    .auth-logo .star {
      display: inline-block;
      font-size: 36px;
      font-weight: 700;
      color: var(--accent);
      text-shadow: 0 0 24px var(--accent-glow), 0 0 48px rgba(139,126,245,0.1);
      line-height: 1;
      margin-bottom: 8px;
    }

    .auth-logo .wordmark {
      display: block;
      font-size: 16px;
      font-weight: 500;
      letter-spacing: 0.18em;
      color: var(--text);
    }

    .auth-tabs {
      display: flex;
      border-bottom: 1px solid var(--border);
      margin-bottom: 24px;
    }

    .auth-tab {
      flex: 1;
      padding: 8px;
      text-align: center;
      font-family: var(--font);
      font-size: 12px;
      letter-spacing: 0.06em;
      color: var(--muted);
      background: none;
      border: none;
      cursor: pointer;
      border-bottom: 2px solid transparent;
      margin-bottom: -1px;
      transition: color 0.15s, border-color 0.15s;
    }

    .auth-tab.active {
      color: var(--text);
      border-bottom-color: var(--accent);
    }

    .auth-form { display: flex; flex-direction: column; gap: 12px; }

    .field label {
      display: block;
      font-size: 11px;
      letter-spacing: 0.08em;
      color: var(--muted);
      margin-bottom: 5px;
    }

    .field input {
      width: 100%;
      padding: 9px 12px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-family: var(--font);
      font-size: 13px;
      outline: none;
      transition: border-color 0.15s;
    }

    .field input:focus { border-color: var(--accent); }
    .field input::placeholder { color: var(--muted); }

    .auth-error {
      font-size: 12px;
      color: var(--danger);
      min-height: 16px;
      text-align: center;
    }

    .btn-primary {
      width: 100%;
      padding: 10px;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: var(--radius);
      font-family: var(--font);
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 0.04em;
      cursor: pointer;
      transition: opacity 0.15s, transform 0.1s;
      margin-top: 4px;
    }

    .btn-primary:hover:not(:disabled)  { opacity: 0.88; }
    .btn-primary:active:not(:disabled) { transform: scale(0.98); }
    .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; }

    /* ── Chat Screen ───────────────────────────────────────────────────────── */
    #chat-screen {
      height: 100%;
      display: flex;
      flex-direction: column;
    }

    /* Header */
    #chat-header {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 0 16px;
      height: 46px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .header-logo {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .header-star {
      font-size: 18px;
      font-weight: 700;
      color: var(--accent);
      line-height: 1;
    }

    .header-name {
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 0.12em;
      color: var(--text);
    }

    .header-sep {
      width: 1px;
      height: 18px;
      background: var(--border);
    }

    #conn-status {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 11px;
      color: var(--muted);
    }

    .status-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--muted);
      transition: background 0.3s;
      flex-shrink: 0;
    }

    .status-dot.connected    { background: var(--success); box-shadow: 0 0 6px rgba(77,255,160,0.4); }
    .status-dot.connecting   { background: #f5c842; animation: pulse 1s ease-in-out infinite; }
    .status-dot.disconnected { background: var(--danger); }

    @keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:0.4; } }

    .header-spacer { flex: 1; }

    #header-user {
      font-size: 12px;
      color: var(--muted);
      display: flex;
      align-items: center;
      gap: 10px;
    }

    #header-username { font-weight: 500; }

    #logout-btn {
      background: none;
      border: 1px solid var(--border);
      color: var(--muted);
      font-family: var(--font);
      font-size: 11px;
      padding: 3px 8px;
      border-radius: var(--radius);
      cursor: pointer;
      letter-spacing: 0.04em;
      transition: color 0.15s, border-color 0.15s;
    }
    #logout-btn:hover { color: var(--text); border-color: var(--border2); }

    /* ── Channel bar (shows DM context) ───────────────────────────────────── */
    #channel-bar {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 0 16px;
      height: 32px;
      background: var(--surface2);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      font-size: 11px;
      color: var(--muted);
    }

    #channel-label { letter-spacing: 0.06em; }

    #back-btn {
      background: none;
      border: none;
      color: var(--muted);
      font-family: var(--font);
      font-size: 11px;
      cursor: pointer;
      padding: 0;
      letter-spacing: 0.04em;
      transition: color 0.15s;
    }
    #back-btn:hover { color: var(--text); }

    /* Main layout */
    #chat-body {
      flex: 1;
      display: flex;
      overflow: hidden;
    }

    /* Messages area */
    #messages-panel {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 12px 0 4px;
      scroll-behavior: smooth;
    }

    /* Message rows */
    .msg {
      display: flex;
      align-items: baseline;
      gap: 10px;
      padding: 3px 16px;
      transition: background 0.1s;
    }
    .msg:hover { background: rgba(255,255,255,0.02); }

    .msg-ts {
      font-size: 10px;
      color: var(--muted);
      flex-shrink: 0;
      width: 42px;
      text-align: right;
      padding-top: 1px;
      user-select: none;
    }

    .msg-user {
      font-size: 12px;
      font-weight: 500;
      flex-shrink: 0;
      user-select: none;
    }

    .msg-sep {
      color: var(--muted);
      flex-shrink: 0;
      user-select: none;
    }

    .msg-text {
      flex: 1;
      word-break: break-word;
      white-space: pre-wrap;
      color: var(--text);
    }

    /* DM sent by self — subtle dimming */
    .msg-dm-out .msg-text { opacity: 0.7; }

    /* System messages */
    .msg-system {
      padding: 4px 16px;
      font-size: 11px;
      color: var(--system-fg);
      font-style: italic;
      text-align: center;
      user-select: none;
    }

    /* Input area */
    #input-area {
      flex-shrink: 0;
      border-top: 1px solid var(--border);
      background: var(--surface);
    }

    #typing-bar {
      height: 20px;
      display: flex;
      align-items: center;
      padding: 0 16px;
      font-size: 11px;
      color: var(--muted);
      font-style: italic;
      user-select: none;
      transition: opacity 0.2s;
    }

    #typing-dots::after {
      content: '';
      animation: dot-anim 1.2s steps(4, end) infinite;
    }
    @keyframes dot-anim {
      0%  { content: '.'; }
      25% { content: '..'; }
      50% { content: '...'; }
      75% { content: ''; }
    }

    #input-row {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 14px 12px;
    }

    #msg-input {
      flex: 1;
      padding: 9px 13px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-family: var(--font);
      font-size: 13px;
      outline: none;
      resize: none;
      transition: border-color 0.15s;
      height: 38px;
      max-height: 140px;
      overflow-y: auto;
    }

    #msg-input:focus { border-color: var(--border2); }
    #msg-input::placeholder { color: var(--muted); }

    #send-btn {
      flex-shrink: 0;
      width: 38px;
      height: 38px;
      background: var(--accent);
      border: none;
      border-radius: var(--radius);
      color: #fff;
      font-size: 16px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: opacity 0.15s;
    }
    #send-btn:hover:not(:disabled) { opacity: 0.85; }
    #send-btn:disabled { opacity: 0.3; cursor: not-allowed; }

    /* ── Right panel (ONLINE + FRIENDS tabs) ───────────────────────────────── */
    #right-panel {
      width: 190px;
      flex-shrink: 0;
      border-left: 1px solid var(--border);
      background: var(--surface);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    #right-tabs {
      display: flex;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .right-tab {
      flex: 1;
      padding: 9px 4px;
      font-family: var(--font);
      font-size: 10px;
      letter-spacing: 0.1em;
      color: var(--muted);
      background: none;
      border: none;
      cursor: pointer;
      border-bottom: 2px solid transparent;
      margin-bottom: -1px;
      transition: color 0.15s, border-color 0.15s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 5px;
    }

    .right-tab.active {
      color: var(--text);
      border-bottom-color: var(--accent);
    }

    .notif-badge {
      background: var(--accent);
      color: #fff;
      font-size: 9px;
      padding: 1px 5px;
      border-radius: 8px;
      font-weight: 700;
      line-height: 1.4;
      font-style: normal;
    }

    /* ── Online tab ─────────────────────────────────────────────────────────── */
    #online-tab {
      flex: 1;
      overflow-y: auto;
      padding: 8px 0;
    }

    .user-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 4px 14px;
    }

    .user-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .user-name {
      font-size: 12px;
      color: var(--text);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .user-name.is-you {
      font-style: italic;
      color: var(--muted);
    }

    /* ── Friends tab ────────────────────────────────────────────────────────── */
    #friends-tab {
      flex: 1;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
    }

    #add-friend-area {
      padding: 10px 10px 0;
      flex-shrink: 0;
    }

    #add-friend-row {
      display: flex;
      gap: 6px;
    }

    #friend-input {
      flex: 1;
      padding: 6px 8px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-family: var(--font);
      font-size: 11px;
      outline: none;
      transition: border-color 0.15s;
      min-width: 0;
    }
    #friend-input:focus { border-color: var(--accent); }
    #friend-input::placeholder { color: var(--muted); }

    #add-friend-btn {
      flex-shrink: 0;
      width: 28px;
      height: 28px;
      background: var(--accent);
      border: none;
      border-radius: var(--radius);
      color: #fff;
      font-size: 18px;
      font-family: var(--font);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: opacity 0.15s;
      line-height: 1;
      padding-bottom: 2px;
    }
    #add-friend-btn:hover { opacity: 0.85; }

    #add-friend-msg {
      font-size: 10px;
      min-height: 18px;
      padding: 4px 2px 2px;
    }
    #add-friend-msg.err  { color: var(--danger); }
    #add-friend-msg.ok   { color: var(--success); }

    .friends-section {
      flex-shrink: 0;
    }

    .friends-section-label {
      padding: 8px 12px 4px;
      font-size: 9px;
      letter-spacing: 0.14em;
      color: var(--muted);
      text-transform: uppercase;
    }

    /* Incoming request card */
    .request-item {
      padding: 6px 10px 8px;
      border-bottom: 1px solid var(--border);
    }

    .request-from {
      font-size: 11px;
      font-weight: 500;
      margin-bottom: 5px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .request-actions { display: flex; gap: 5px; }

    .btn-accept, .btn-reject {
      flex: 1;
      padding: 3px 0;
      font-family: var(--font);
      font-size: 10px;
      border-radius: var(--radius);
      cursor: pointer;
      border: 1px solid;
      transition: opacity 0.15s;
      letter-spacing: 0.04em;
    }
    .btn-accept { background: rgba(77,255,160,0.08); border-color: rgba(77,255,160,0.25); color: var(--success); }
    .btn-reject { background: rgba(255,77,106,0.07); border-color: rgba(255,77,106,0.22); color: var(--danger); }
    .btn-accept:hover, .btn-reject:hover { opacity: 0.75; }

    /* Outgoing request row */
    .outgoing-item {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 3px 12px 3px 12px;
    }

    .outgoing-name {
      font-size: 11px;
      color: var(--muted);
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-style: italic;
    }

    .btn-cancel-sm {
      background: none;
      border: none;
      color: var(--muted);
      font-size: 14px;
      cursor: pointer;
      line-height: 1;
      padding: 0 2px;
      transition: color 0.15s;
      flex-shrink: 0;
    }
    .btn-cancel-sm:hover { color: var(--danger); }

    /* Accepted friend row */
    .friend-item {
      display: flex;
      align-items: center;
      gap: 7px;
      padding: 4px 10px 4px 12px;
      cursor: default;
      transition: background 0.1s;
      position: relative;
    }
    .friend-item:hover { background: rgba(255,255,255,0.025); }
    .friend-item:hover .friend-actions { opacity: 1; }

    .friend-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .friend-name {
      font-size: 12px;
      color: var(--text);
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .friend-actions {
      display: flex;
      gap: 2px;
      opacity: 0;
      transition: opacity 0.15s;
      flex-shrink: 0;
    }

    .friend-dm-btn {
      background: none;
      border: none;
      font-family: var(--font);
      font-size: 10px;
      cursor: pointer;
      padding: 2px 5px;
      border-radius: 3px;
      color: var(--accent);
      transition: background 0.1s;
      letter-spacing: 0.03em;
    }
    .friend-dm-btn:hover { background: var(--accent-glow); }

    .friend-remove-btn {
      background: none;
      border: none;
      font-family: var(--font);
      font-size: 13px;
      cursor: pointer;
      padding: 0 3px;
      border-radius: 3px;
      color: var(--muted);
      transition: color 0.1s;
      line-height: 1.4;
    }
    .friend-remove-btn:hover { color: var(--danger); }

    /* Empty state */
    .friends-empty {
      padding: 14px 12px;
      font-size: 11px;
      color: var(--muted);
      font-style: italic;
    }

    /* ── Responsive ────────────────────────────────────────────────────────── */
    /* ── Mobile Layout ─────────────────────────────────────────────────────────── */
@media (max-width: 600px) {
  .auth-card { width: 100%; margin: 16px; padding: 32px 20px 24px; }

  /* Hide right panel — replaced by bottom nav */
  #right-panel { display: none; }

  /* Header tweaks */
  #chat-header { padding: 0 10px; gap: 8px; }
  #rate-limit  { display: none; }
  .header-sep:last-of-type { display: none; }

  /* Channel bar */
  #channel-bar { padding: 0 10px; }

  /* Push input area above bottom nav */
  #chat-screen { padding-bottom: 48px; }

  /* Bottom navigation bar */
  #mobile-nav {
    display: flex;
    position: fixed;
    bottom: 0; left: 0; right: 0;
    height: 48px;
    background: var(--surface);
    border-top: 1px solid var(--border);
    z-index: 100;
  }

  .mobile-nav-btn {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 2px;
    background: none;
    border: none;
    color: var(--muted);
    font-family: var(--font);
    font-size: 9px;
    letter-spacing: 0.08em;
    cursor: pointer;
    position: relative;
    transition: color 0.15s;
  }
  .mobile-nav-btn.active { color: var(--accent); }
  .mobile-nav-btn .nav-icon { font-size: 16px; line-height: 1; }

  .mobile-nav-badge {
    position: absolute;
    top: 6px; right: calc(50% - 18px);
    background: var(--accent);
    color: #fff;
    font-size: 9px;
    padding: 1px 4px;
    border-radius: 8px;
    font-weight: 700;
    line-height: 1.4;
  }

  /* Mobile panels (online + friends) overlay the messages area */
  #mobile-online-panel,
  #mobile-friends-panel {
    display: none;
    position: absolute;
    top: 78px; /* header + channel bar */
    bottom: 48px; /* above nav */
    left: 0; right: 0;
    background: var(--bg);
    overflow-y: auto;
    z-index: 50;
    padding: 8px 0;
  }

  #mobile-friends-panel { padding: 0; }

  #mobile-online-panel.visible,
  #mobile-friends-panel.visible { display: block; }

  /* Make chat body position:relative so panels overlay it */
  #chat-body { position: relative; }

  /* Touch-friendly sizing */
  .msg      { padding: 4px 12px; }
  .msg-ts   { display: none; } /* hide timestamps on mobile to save space */
  #input-row { padding: 8px 10px 10px; }
  #msg-input { font-size: 16px; } /* prevents iOS zoom */
  #send-btn  { width: 42px; height: 42px; font-size: 18px; }

  .friend-actions { opacity: 1; } /* always show on mobile (no hover) */
  .user-item { padding: 6px 16px; }
  .friend-item { padding: 6px 12px; }
  .request-item { padding: 8px 14px 10px; }
}

/* Desktop: hide mobile-only elements */
@media (min-width: 601px) {
  #mobile-nav { display: none; }
  #mobile-online-panel,
  #mobile-friends-panel { display: none !important; }
}

#channel-tabs { display: flex; gap: 4px; }
.ch-tab {
  background: none;
  border: none;
  font-family: var(--font);
  font-size: 11px;
  color: var(--muted);
  cursor: pointer;
  padding: 2px 6px;
  border-radius: var(--radius);
  transition: color 0.15s, background 0.15s;
  letter-spacing: 0.04em;
}
.ch-tab:hover { color: var(--text); }
.ch-tab.active { color: var(--accent); background: var(--accent-glow); }

@media (max-width: 600px) {
  #channel-tabs { gap: 2px; }
  .ch-tab { font-size: 10px; padding: 2px 4px; }
}

#attachment-preview {
  display: none;
  align-items: center;
  gap: 8px;
  padding: 6px 14px 0;
  font-size: 11px;
  color: var(--muted);
}

#attachment-preview.visible { display: flex; }

#attachment-name {
  color: var(--accent);
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  max-width: 200px;
}

#attachment-remove {
  background: none;
  border: none;
  color: var(--muted);
  cursor: pointer;
  font-size: 14px;
  line-height: 1;
  padding: 0 2px;
  flex-shrink: 0;
  transition: color 0.15s;
}
#attachment-remove:hover { color: var(--danger); }
  </style>
</head>
<body>

<!-- ── Auth Screen ─────────────────────────────────────────────────────────── -->
<div id="auth-screen">
  <div class="auth-card">

    <div class="header-sep"></div>
    <div id="conn-status">

    <div class="header-sep" style="margin-left:6px;"></div>

</div>

      📎
       <input type="file" id="file-input" accept="image/*,video/mp4,video/webm,video/ogg,text/plain" style="display:none">

</div>
    </div>

    <!-- Right panel: ONLINE / FRIENDS tabs -->

                   onkeydown="if(event.key==='Enter') sendFriendRequest()">
            <button id="add-friend-btn" onclick="sendFriendRequest()" title="Send friend request">+</button>
          </div>

<!-- Mobile bottom nav -->
<div id="mobile-nav" class="hidden">
  <button class="mobile-nav-btn active" id="mnav-chat" onclick="mobileNav('chat')">
    <span class="nav-icon">💬</span>chat
  </button>
  <button class="mobile-nav-btn" id="mnav-online" onclick="mobileNav('online')">
    <span class="nav-icon">●</span>online
  </button>
  <button class="mobile-nav-btn" id="mnav-friends" onclick="mobileNav('friends')">
    <span class="nav-icon">★</span>friends
    <span id="mobile-friends-badge" class="mobile-nav-badge hidden"></span>
  </button>
</div>

<!-- Mobile overlay panels -->
<div id="mobile-online-panel"></div>
<div id="mobile-friends-panel"></div>

<script src="config.js"></script>
<script>
// ── Config ────────────────────────────────────────────────────────────────────
const RAW_URL   = (typeof ASTERISK_CONFIG !== 'undefined' ? ASTERISK_CONFIG.BACKEND_URL
                  : window.location.protocol !== 'file:' ? window.location.origin
                  : 'http://localhost:3001').replace(/\/$/, '');
const HTTP_BASE = RAW_URL;
const WS_BASE   = RAW_URL.replace(/^https/, 'wss').replace(/^http/, 'ws');
const TOKEN_KEY = 'asterisk_token';

// ── State ─────────────────────────────────────────────────────────────────────
let ws              = null;
let currentUser     = null;   // { username, color }
let currentDM       = null;   // username of open DM, or null for global chat
let friendsState    = { friends: [], incoming: [], outgoing: [] };
let dmCache         = {};     // { username: [messages] }

let isTyping        = false;
let typingTimeout   = null;
let reconnectTimer  = null;
let shouldReconnect = true;
let reconnectDelay  = 2000;
let rateRemaining   = 20;
let rateReset       = 0;

let currentChannel = 'global';

function switchChannel(ch) {
  if (currentDM) closeDM();
  currentChannel = ch;
  document.querySelectorAll('.ch-tab').forEach(b =>
    b.classList.toggle('active', b.textContent === '#' + ch)
  );
  document.getElementById('channel-label').textContent = '#' + ch;
  document.getElementById('messages').innerHTML = '';
  sendWS({ type: 'join_channel', channel: ch });
}

function removeAttachment() {
  document.getElementById('file-input').value = '';
  document.getElementById('attachment-preview').classList.remove('visible');
  document.getElementById('attachment-name').textContent = '';
}

// ── Token helpers ─────────────────────────────────────────────────────────────
const getToken   = ()    => localStorage.getItem(TOKEN_KEY);
const setToken   = (tok) => localStorage.setItem(TOKEN_KEY, tok);
const clearToken = ()    => localStorage.removeItem(TOKEN_KEY);

// ── Auth tab switching ────────────────────────────────────────────────────────
function switchTab(tab) {
  document.getElementById('tab-login').classList.toggle('active', tab === 'login');
  document.getElementById('tab-register').classList.toggle('active', tab === 'register');
  document.getElementById('form-login').classList.toggle('hidden', tab !== 'login');
  document.getElementById('form-register').classList.toggle('hidden', tab !== 'register');
  document.getElementById('login-error').textContent = '';
  document.getElementById('reg-error').textContent   = '';
}

// ── Right panel tab switching ─────────────────────────────────────────────────
function switchRightTab(tab) {
  document.getElementById('tab-online').classList.toggle('active',  tab === 'online');
  document.getElementById('tab-friends').classList.toggle('active', tab === 'friends');
  document.getElementById('online-tab').classList.toggle('hidden',  tab !== 'online');
  document.getElementById('friends-tab').classList.toggle('hidden', tab !== 'friends');
}

// ── Auth API calls ────────────────────────────────────────────────────────────
async function apiPost(path, body) {
  const res  = await fetch(HTTP_BASE + path, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(body)
  });
  const data = await res.json();
  if (!res.ok) throw new Error(data.error || 'Unknown error');
  return data;
}

async function apiDelete(path) {
  const res  = await fetch(HTTP_BASE + path, {
    method: 'DELETE',
    headers: { Authorization: 'Bearer ' + getToken() }
  });
  const data = await res.json();
  if (!res.ok) throw new Error(data.error || 'Unknown error');
  return data;
}

async function apiAuthPost(path, body) {
  const res  = await fetch(HTTP_BASE + path, {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      Authorization: 'Bearer ' + getToken()
    },
    body: JSON.stringify(body)
  });
  const data = await res.json();
  if (!res.ok) throw new Error(data.error || 'Unknown error');
  return data;
}

async function doLogin() {
  const username = document.getElementById('login-user').value.trim();
  const password = document.getElementById('login-pass').value;
  const errEl    = document.getElementById('login-error');
  const btn      = document.getElementById('login-btn');
  if (!username || !password) { errEl.textContent = 'Fill in all fields.'; return; }
  errEl.textContent = '';
  btn.disabled = true;
  try {
    const { token, username: u, color } = await apiPost('/api/login', { username, password });
    setToken(token);
    enterChat({ username: u, color });
  } catch (e) { errEl.textContent = e.message; }
  finally      { btn.disabled = false; }
}

async function doRegister() {
  const username = document.getElementById('reg-user').value.trim();
  const password = document.getElementById('reg-pass').value;
  const pass2    = document.getElementById('reg-pass2').value;
  const errEl    = document.getElementById('reg-error');
  const btn      = document.getElementById('reg-btn');
  if (!username || !password || !pass2) { errEl.textContent = 'Fill in all fields.'; return; }
  if (password !== pass2)               { errEl.textContent = 'Passwords do not match.'; return; }
  errEl.textContent = '';
  btn.disabled = true;
  try {
    const { token, username: u, color } = await apiPost('/api/register', { username, password });
    setToken(token);
    enterChat({ username: u, color });
  } catch (e) { errEl.textContent = e.message; }
  finally      { btn.disabled = false; }
}

function doLogout() {
  shouldReconnect = false;
  if (ws) ws.close();
  clearToken();
  currentUser = null;
  currentDM   = null;
  document.getElementById('chat-screen').classList.add('hidden');
  document.getElementById('auth-screen').classList.remove('hidden');
  document.getElementById('messages').innerHTML   = '';
  document.getElementById('users-list').innerHTML = '';
  document.getElementById('login-user').value     = '';
  document.getElementById('login-pass').value     = '';
  switchTab('login');
}

// ── Auto-login on load ────────────────────────────────────────────────────────
window.addEventListener('load', async () => {
  const token = getToken();
  if (!token) return;
  try {
    const res = await fetch(HTTP_BASE + '/api/verify', {
      headers: { Authorization: 'Bearer ' + token }
    });
    if (!res.ok) { clearToken(); return; }
    const { username, color } = await res.json();
    enterChat({ username, color });
  } catch { /* server unreachable — show auth screen */ }
});

// ── Enter chat ────────────────────────────────────────────────────────────────
function enterChat(user) {
  currentUser     = user;
  shouldReconnect = true;
  reconnectDelay  = 2000;

  document.getElementById('auth-screen').classList.add('hidden');
  document.getElementById('chat-screen').classList.remove('hidden');
  document.getElementById('header-username').textContent = user.username;
  document.getElementById('header-username').style.color = user.color;

  connectWS();
  if (isMobile()) document.getElementById('mobile-nav').classList.remove('hidden');
  document.getElementById('msg-input').focus();
}

// ── WebSocket ─────────────────────────────────────────────────────────────────
function connectWS() {
  const token = getToken();
  if (!token) return;
  setStatus('connecting');
  ws = new WebSocket(`${WS_BASE}/ws?token=${encodeURIComponent(token)}`);

  ws.addEventListener('open', () => {
    setStatus('connected');
    reconnectDelay = 2000;
  });

  ws.addEventListener('message', e => {
    let msg;
    try { msg = JSON.parse(e.data); } catch { return; }
    handleServerMessage(msg);
  });

  ws.addEventListener('close', e => {
    setStatus('disconnected');
    if (e.code === 1008) { doLogout(); return; }
    if (shouldReconnect) scheduleReconnect();
  });

  ws.addEventListener('error', () => setStatus('disconnected'));
}


function scheduleReconnect() {
  clearTimeout(reconnectTimer);
  reconnectTimer = setTimeout(() => {
    if (shouldReconnect) connectWS();
  }, reconnectDelay);
  reconnectDelay = Math.min(reconnectDelay * 1.5, 30000);
}

function setStatus(s) {
  document.getElementById('status-dot').className  = 'status-dot ' + s;
  document.getElementById('status-text').textContent = s;
}

function sendWS(data) {
  if (ws && ws.readyState === 1) ws.send(JSON.stringify(data));
}

// ── Handle server messages ────────────────────────────────────────────────────
function handleServerMessage(msg) {
  switch (msg.type) {

    case 'history':
      if (currentDM) break;
      if (msg.channel && msg.channel !== currentChannel) break;
      const el = document.getElementById('messages');
      el.innerHTML = '';
      msg.messages.forEach(renderMessage);
      el.scrollTop = el.scrollHeight;
      break;

    case 'message':
    case 'system':
      if (!currentDM && (!msg.channel || msg.channel === currentChannel)) {
        renderMessage(msg);
        scrollToBottom();
      }
      break;

    case 'user_list':
      renderUserList(msg.users);
      break;

    case 'typing':
      if (!currentDM) renderTyping(msg.users);
      break;

    case 'rate_limit':
      updateRateLimit(msg);
      break;

    case 'kicked':
      doLogout();
      break;

    // ── Friends ──────────────────────────────────────────────────────────────
    case 'friends_state':
      friendsState = msg;
      renderFriendsPanel();
      break;

    case 'friend_request':
      friendsState.incoming = friendsState.incoming || [];
      friendsState.incoming.push({ id: msg.id, from: msg.from, color: msg.color });
      renderFriendsPanel();
      break;

    case 'friend_accepted':
      // Move from outgoing to accepted
      friendsState.outgoing = (friendsState.outgoing || []).filter(r => r.to !== msg.username);
      friendsState.incoming = (friendsState.incoming || []).filter(r => r.from !== msg.username);
      friendsState.friends  = friendsState.friends || [];
      if (!friendsState.friends.find(f => f.username === msg.username))
        friendsState.friends.push({ username: msg.username, color: msg.color });
      renderFriendsPanel();
      break;

    case 'friend_removed':
      friendsState.friends = (friendsState.friends || []).filter(f => f.username !== msg.username);
      renderFriendsPanel();
      if (currentDM === msg.username) closeDM();
      break;

    // ── DMs ──────────────────────────────────────────────────────────────────
    case 'dm': {
      const other = msg.from === currentUser?.username ? msg.to : msg.from;
      if (!dmCache[other]) dmCache[other] = [];
      dmCache[other].push(msg);
      if (currentDM === other) {
        renderDMMessage(msg);
        scrollToBottom();
      } else {
        // Visual nudge on the friend's row in the panel
        highlightFriend(other);
      }
      break;
    }

    case 'dm_history':
      dmCache[msg.with] = msg.messages;
      if (currentDM === msg.with) {
        const container = document.getElementById('messages');
        container.innerHTML = '';
        msg.messages.forEach(renderDMMessage);
        container.scrollTop = container.scrollHeight;
      }
      break;
  }
}

// ── Render global message ─────────────────────────────────────────────────────
function renderMessage(msg) {
  const container = document.getElementById('messages');

  if (msg.type === 'system') {
    const el = document.createElement('div');
    el.className   = 'msg-system';
    el.textContent = '— ' + msg.text + ' —';
    container.appendChild(el);
    return;
  }

  const ts   = new Date(msg.timestamp);
  const time = ts.getHours().toString().padStart(2,'0') + ':' + ts.getMinutes().toString().padStart(2,'0');

  const row    = document.createElement('div');
  row.className = 'msg';

  const tsEl   = document.createElement('span');
  tsEl.className   = 'msg-ts';
  tsEl.textContent = time;

  const userEl = document.createElement('span');
  userEl.className   = 'msg-user';
  userEl.style.color = msg.color || '#888';
  userEl.textContent = msg.username;

  const sepEl  = document.createElement('span');
  sepEl.className   = 'msg-sep';
  sepEl.textContent = '›';

  const textEl = document.createElement('span');
  textEl.className   = 'msg-text';
  textEl.textContent = msg.text;

  if (msg.fileUrl) {
  const url = HTTP_BASE + msg.fileUrl;

  if (msg.fileType.startsWith('image/')) {
    const img = document.createElement('img');
    img.src = url;
    img.style.cssText = 'max-width:260px;margin-top:4px;border-radius:4px;';
    textEl.appendChild(img);

  } else if (msg.fileType.startsWith('video/')) {
    const video = document.createElement('video');
    video.src = url;
    video.controls = true;
    video.style.cssText = 'max-width:260px;margin-top:4px;border-radius:4px;';
    textEl.appendChild(video);

  } else if (msg.fileType === 'text/plain') {
    const link = document.createElement('a');
    link.href = url;
    link.textContent = '📄 view text file';
    link.target = '_blank';
    textEl.appendChild(link);

  } else {
    const link = document.createElement('a');
    link.href = url;
    link.textContent = 'download file';
    link.target = '_blank';
    textEl.appendChild(link);
  }
}

  row.append(tsEl, userEl, sepEl, textEl);
  container.appendChild(row);
}

// ── Render DM message ─────────────────────────────────────────────────────────
function renderDMMessage(msg) {
  const container = document.getElementById('messages');
  const isSelf    = msg.from === currentUser?.username;

  const ts   = new Date(msg.timestamp);
  const time = ts.getHours().toString().padStart(2,'0') + ':' + ts.getMinutes().toString().padStart(2,'0');

  const row    = document.createElement('div');
  row.className = 'msg ' + (isSelf ? 'msg-dm-out' : 'msg-dm-in');

  const tsEl   = document.createElement('span');
  tsEl.className   = 'msg-ts';
  tsEl.textContent = time;

  const userEl = document.createElement('span');
  userEl.className   = 'msg-user';
  userEl.style.color = msg.color || '#888';
  userEl.textContent = msg.from;

  const sepEl  = document.createElement('span');
  sepEl.className   = 'msg-sep';
  sepEl.textContent = '›';

  const textEl = document.createElement('span');
  textEl.className   = 'msg-text';
  textEl.textContent = msg.text;

  if (msg.imageUrl) {
  const img = document.createElement('img');
  img.src = HTTP_BASE + msg.imageUrl;
  img.style.cssText = 'display:block;max-width:260px;max-height:200px;margin-top:4px;border-radius:4px;cursor:pointer;';
  img.onclick = () => window.open(img.src);
  textEl.appendChild(img);
}

  row.append(tsEl, userEl, sepEl, textEl);
  container.appendChild(row);
}

// ── Open / close DM view ──────────────────────────────────────────────────────
function openDM(username) {
  currentDM = username;

  const friend = friendsState.friends?.find(f => f.username === username);
  const color  = friend?.color || '#888';

  // Update channel bar
  const bar   = document.getElementById('channel-bar');
  bar.innerHTML = '';
  const back  = document.createElement('button');
  back.id = 'back-btn';
  back.textContent = '← back';
  back.onclick = closeDM;
  const label = document.createElement('span');
  label.id = 'channel-label';
  label.innerHTML = `dm — <span style="color:${color};font-weight:500">${username}</span>`;
  bar.append(back, label);

  // Update input placeholder
  document.getElementById('msg-input').placeholder = `message ${username}...`;

  // Clear messages and show DM history
  const container = document.getElementById('messages');
  container.innerHTML = '';

  if (dmCache[username]) {
    dmCache[username].forEach(renderDMMessage);
    container.scrollTop = container.scrollHeight;
  }

  // Request history from server
  sendWS({ type: 'dm_history', with: username });

  // Clear unread highlight
  const row = document.querySelector(`.friend-item[data-user="${username}"]`);
  if (row) row.classList.remove('friend-unread');

  document.getElementById('msg-input').focus();
}

function closeDM() {
  currentDM = null;

  // Restore channel bar
  const bar   = document.getElementById('channel-bar');
  bar.innerHTML = '<span id="channel-label">global chat</span>';

  // Restore input placeholder
  document.getElementById('msg-input').placeholder = 'say something...';

  // Reload global history from cache (re-request on reconnect; for now restore what we have)
  // We'll ask for global history by reconnecting or just clearing
  const container = document.getElementById('messages');
  container.innerHTML = '<div class="msg-system" style="padding:12px 16px;">— returned to global chat —</div>';

  document.getElementById('msg-input').focus();
}

// ── Highlight friend row (unread indicator) ───────────────────────────────────
function highlightFriend(username) {
  const row = document.querySelector(`.friend-item[data-user="${username}"]`);
  if (row) {
    row.style.background = 'rgba(139,126,245,0.07)';
  }
  // Also switch to friends tab badge
  updateFriendsBadge();
}

// ── Scroll ────────────────────────────────────────────────────────────────────
function scrollToBottom() {
  const el = document.getElementById('messages');
  const threshold = 120;
  if (el.scrollHeight - el.scrollTop - el.clientHeight < threshold)
    el.scrollTop = el.scrollHeight;
}

// ── User list ─────────────────────────────────────────────────────────────────
function renderUserList(users) {
  const list = document.getElementById('users-list');
  list.innerHTML = '';

  const sorted = [...users].sort((a, b) => {
    if (a.username === currentUser?.username) return 1;
    if (b.username === currentUser?.username) return -1;
    return a.username.localeCompare(b.username);
  });

  sorted.forEach(u => {
    const item = document.createElement('div');
    item.className = 'user-item';

    const dot  = document.createElement('span');
    dot.className = 'user-dot';
    dot.style.background = u.color;

    const name = document.createElement('span');
    name.className   = 'user-name' + (u.username === currentUser?.username ? ' is-you' : '');
    name.textContent = u.username === currentUser?.username ? u.username + ' (you)' : u.username;

    item.append(dot, name);
    list.appendChild(item);
  });
}

// ── Typing indicator ──────────────────────────────────────────────────────────
function renderTyping(users) {
  const others = users.filter(u => u !== currentUser?.username);
  const textEl = document.getElementById('typing-text');
  const dotsEl = document.getElementById('typing-dots');

  if (others.length === 0) {
    textEl.textContent   = '';
    dotsEl.style.display = 'none';
    return;
  }

  dotsEl.style.display = 'inline';
  if      (others.length === 1) textEl.textContent = others[0] + ' is typing';
  else if (others.length === 2) textEl.textContent = others[0] + ' and ' + others[1] + ' are typing';
  else                          textEl.textContent = others.length + ' people are typing';
}

// ── Send message (routes to DM or global) ─────────────────────────────────────
async function sendMessage() {
  if (rateRemaining <= 0) return;
  const input = document.getElementById('msg-input');
  const fileInput = document.getElementById('file-input');
  const text = input.value.trim();
  const file = fileInput.files[0];
  if (!text && !file) return;

  let imageUrl = null;
  if (file) {
    const form = new FormData();
    form.append('file', file);
    const res = await fetch(HTTP_BASE + '/api/upload', {
      method: 'POST',
      headers: { Authorization: 'Bearer ' + getToken() },
      body: form
    });
    const data = await res.json();
    imageUrl = data.url;
    fileType = file.type;
    fileInput.value = '';
 document.getElementById('attachment-preview').classList.remove('visible');
document.getElementById('attachment-name').textContent = '';
  }

  const payload = { type: currentDM ? 'dm' : 'message', text: text || ' ', channel: currentChannel };
  if (currentDM) payload.to = currentDM;
  if (imageUrl) {
    payload.imageUrl = imageUrl;
    payload.fileType = file.type;
  }
  sendWS(payload);

  input.value = '';
  input.style.height = '';
  stopTyping();
}
// ── Input handling ────────────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', () => {
  const input = document.getElementById('msg-input');

  input.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  });

  input.addEventListener('input', () => {
    input.style.height = 'auto';
    input.style.height = Math.min(input.scrollHeight, 140) + 'px';
    if (!currentDM) {
      if (input.value.trim()) startTyping(); else stopTyping();
    }
  });

  document.getElementById('login-pass').addEventListener('keydown', e => {
    if (e.key === 'Enter') doLogin();
  });
  document.getElementById('login-user').addEventListener('keydown', e => {
    if (e.key === 'Enter') document.getElementById('login-pass').focus();
  });
  document.getElementById('reg-pass').addEventListener('keydown', e => {
    if (e.key === 'Enter') document.getElementById('reg-pass2').focus();
  });
  document.getElementById('reg-pass2').addEventListener('keydown', e => {
    if (e.key === 'Enter') doRegister();
  });

  document.getElementById('file-input').addEventListener('change', () => {
    const file = document.getElementById('file-input').files[0];
    if (!file) return;
    document.getElementById('attachment-name').textContent = file.name;
    document.getElementById('attachment-preview').classList.add('visible');
  });
});
  
function startTyping() {
  if (!isTyping) { isTyping = true; sendWS({ type: 'typing' }); }
  clearTimeout(typingTimeout);
  typingTimeout = setTimeout(stopTyping, 3000);
}

function stopTyping() {
  if (isTyping) { isTyping = false; sendWS({ type: 'stop_typing' }); }
  clearTimeout(typingTimeout);
}

// ── Rate limit display ────────────────────────────────────────────────────────
function updateRateLimit(data) {
  rateRemaining = data.remaining;
  rateReset     = data.reset;
  const el = document.getElementById('rate-limit');
  if (rateRemaining <= 0) {
    const secs = Math.ceil((rateReset - Date.now()) / 1000);
    el.textContent = `rate limit — resets in ${secs}s`;
  } else {
    el.textContent = `${rateRemaining}/20 left`;
  }
}

setInterval(() => {
  if (!rateReset) return;
  const el = document.getElementById('rate-limit');
  const remaining = Math.max(0, rateReset - Date.now());
  if (remaining <= 0) {
    rateRemaining  = 20;
    el.textContent = '20 messages / min';
    return;
  }
  if (rateRemaining <= 0) {
    el.textContent = `rate limit — resets in ${Math.ceil(remaining / 1000)}s`;
  }
}, 500);

// ── Friends panel rendering ───────────────────────────────────────────────────
function renderFriendsPanel() {
  renderIncoming();
  renderOutgoing();
  renderFriendsList();
  updateFriendsBadge();
}

function updateFriendsBadge() {
  const count = (friendsState.incoming || []).length;
  const badge = document.getElementById('friends-badge');
  if (count > 0) {
    badge.textContent = count;
    badge.classList.remove('hidden');
  } else {
    badge.classList.add('hidden');
  }
}

function renderIncoming() {
  const section  = document.getElementById('section-incoming');
  const incoming = friendsState.incoming || [];
  section.innerHTML = '';
  if (!incoming.length) return;

  const label = document.createElement('div');
  label.className   = 'friends-section-label';
  label.textContent = 'INCOMING';
  section.appendChild(label);

  incoming.forEach(req => {
    const item = document.createElement('div');
    item.className = 'request-item';

    const from = document.createElement('div');
    from.className   = 'request-from';
    from.style.color = req.color || '#888';
    from.textContent = req.from;

    const actions = document.createElement('div');
    actions.className = 'request-actions';

    const acc = document.createElement('button');
    acc.className   = 'btn-accept';
    acc.textContent = 'accept';
    acc.onclick     = () => acceptFriendRequest(req.from);

    const rej = document.createElement('button');
    rej.className   = 'btn-reject';
    rej.textContent = 'reject';
    rej.onclick     = () => rejectFriendRequest(req.from);

    actions.append(acc, rej);
    item.append(from, actions);
    section.appendChild(item);
  });
}

function renderOutgoing() {
  const section  = document.getElementById('section-outgoing');
  const outgoing = friendsState.outgoing || [];
  section.innerHTML = '';
  if (!outgoing.length) return;

  const label = document.createElement('div');
  label.className   = 'friends-section-label';
  label.textContent = 'PENDING';
  section.appendChild(label);

  outgoing.forEach(req => {
    const item = document.createElement('div');
    item.className = 'outgoing-item';

    const name = document.createElement('span');
    name.className   = 'outgoing-name';
    name.textContent = req.to;

    const cancel = document.createElement('button');
    cancel.className   = 'btn-cancel-sm';
    cancel.title       = 'cancel request';
    cancel.textContent = '×';
    cancel.onclick     = () => cancelFriendRequest(req.to);

    item.append(name, cancel);
    section.appendChild(item);
  });
}

function renderFriendsList() {
  const section = document.getElementById('section-friends');
  const friends = friendsState.friends || [];
  section.innerHTML = '';

  const label = document.createElement('div');
  label.className   = 'friends-section-label';
  label.textContent = 'FRIENDS';
  section.appendChild(label);

  if (!friends.length) {
    const empty = document.createElement('div');
    empty.className   = 'friends-empty';
    empty.textContent = 'no friends yet';
    section.appendChild(empty);
    return;
  }

  [...friends]
    .sort((a, b) => a.username.localeCompare(b.username))
    .forEach(f => {
      const item = document.createElement('div');
      item.className        = 'friend-item';
      item.dataset.user     = f.username;

      const dot  = document.createElement('span');
      dot.className = 'friend-dot';
      dot.style.background = f.color || '#888';

      const name = document.createElement('span');
      name.className   = 'friend-name';
      name.textContent = f.username;

      const actions = document.createElement('div');
      actions.className = 'friend-actions';

      const dmBtn = document.createElement('button');
      dmBtn.className   = 'friend-dm-btn';
      dmBtn.textContent = 'dm';
      dmBtn.title       = `DM ${f.username}`;
      dmBtn.onclick     = (e) => { e.stopPropagation(); openDM(f.username); };

      const removeBtn = document.createElement('button');
      removeBtn.className   = 'friend-remove-btn';
      removeBtn.textContent = '×';
      removeBtn.title       = 'remove friend';
      removeBtn.onclick     = (e) => { e.stopPropagation(); removeFriend(f.username); };

      actions.append(dmBtn, removeBtn);
      item.append(dot, name, actions);
      item.ondblclick = () => openDM(f.username);
      section.appendChild(item);
    });
}

// ── Friends API actions ───────────────────────────────────────────────────────
async function sendFriendRequest() {
  const input = document.getElementById('friend-input');
  const msgEl = document.getElementById('add-friend-msg');
  const to    = input.value.trim();
  if (!to) return;

  msgEl.className   = '';
  msgEl.textContent = '';

  try {
    const res = await apiAuthPost('/api/friends/request', { to });
    input.value = '';
    if (res.status === 'accepted') {
      msgEl.className   = 'ok';
      msgEl.textContent = `now friends with ${to}!`;
    } else {
      msgEl.className   = 'ok';
      msgEl.textContent = `request sent to ${to}`;
    }
    setTimeout(() => { msgEl.textContent = ''; }, 3000);
  } catch (e) {
    msgEl.className   = 'err';
    msgEl.textContent = e.message;
  }
}

async function acceptFriendRequest(from) {
  try {
    await apiAuthPost('/api/friends/accept', { from });
    friendsState.incoming = (friendsState.incoming || []).filter(r => r.from !== from);
    renderFriendsPanel();
  } catch (e) { console.error(e); }
}

async function rejectFriendRequest(from) {
  try {
    await apiAuthPost('/api/friends/reject', { from });
    friendsState.incoming = (friendsState.incoming || []).filter(r => r.from !== from);
    renderFriendsPanel();
  } catch (e) { console.error(e); }
}

async function cancelFriendRequest(to) {
  try {
    await apiAuthPost('/api/friends/cancel', { to });
    friendsState.outgoing = (friendsState.outgoing || []).filter(r => r.to !== to);
    renderFriendsPanel();
  } catch (e) { console.error(e); }
}

async function removeFriend(username) {
  try {
    await apiDelete('/api/friends/' + encodeURIComponent(username));
    friendsState.friends = (friendsState.friends || []).filter(f => f.username !== username);
    renderFriendsPanel();
    if (currentDM === username) closeDM();
  } catch (e) { console.error(e); }
}

// ── Mobile nav ────────────────────────────────────────────────────────────────
function isMobile() { return window.innerWidth <= 600; }

function mobileNav(tab) {
  if (!isMobile()) return;
  document.getElementById('mnav-chat').classList.toggle('active',    tab === 'chat');
  document.getElementById('mnav-online').classList.toggle('active',  tab === 'online');
  document.getElementById('mnav-friends').classList.toggle('active', tab === 'friends');
  document.getElementById('mobile-online-panel').classList.toggle('visible',  tab === 'online');
  document.getElementById('mobile-friends-panel').classList.toggle('visible', tab === 'friends');

  if (tab === 'online')  syncMobileOnline();
  if (tab === 'friends') syncMobileFriends();
}

function syncMobileOnline() {
  const panel = document.getElementById('mobile-online-panel');
  panel.innerHTML = document.getElementById('users-list').innerHTML;
}

function syncMobileFriends() {
  const panel = document.getElementById('mobile-friends-panel');
  // Clone the full friends tab content
  panel.innerHTML = document.getElementById('friends-tab').innerHTML;
  // Re-wire buttons since they're clones
  panel.querySelectorAll('.friend-dm-btn').forEach(btn => {
    const user = btn.closest('.friend-item')?.dataset.user;
    if (user) btn.onclick = (e) => { e.stopPropagation(); openDM(user); mobileNav('chat'); };
  });
  panel.querySelectorAll('.friend-remove-btn').forEach(btn => {
    const user = btn.closest('.friend-item')?.dataset.user;
    if (user) btn.onclick = (e) => { e.stopPropagation(); removeFriend(user); };
  });
  // Wire add-friend button in the cloned panel
  const addBtn = panel.querySelector('#add-friend-btn');
  const addInput = panel.querySelector('#friend-input');
  if (addBtn) addBtn.onclick = async () => {
    if (!addInput) return;
    const to = addInput.value.trim();
    const msgEl = panel.querySelector('#add-friend-msg');
    if (!to) return;
    try {
      const res = await apiAuthPost('/api/friends/request', { to });
      addInput.value = '';
      msgEl.className = 'ok';
      msgEl.textContent = res.status === 'accepted' ? `now friends with ${to}!` : `request sent to ${to}`;
      setTimeout(() => { msgEl.textContent = ''; }, 3000);
    } catch(e) { msgEl.className = 'err'; msgEl.textContent = e.message; }
  };
}
